version: '3.9'
services:
  app:
    build: .
    ports: ["3000:3000"]
    environment:
      - NODE_ENV=production
      - AI_PROVIDER=auto
      - REMOVEBG_API_KEY=${REMOVEBG_API_KEY}
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX_REQUESTS=10
    volumes:
      - /tmp:/tmp   # ephemeral only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health", "||", "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
