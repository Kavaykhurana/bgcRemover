<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BGC Remover - AI Background Removal</title>
    <meta
      name="description"
      content="Production-ready AI background removal tool powered by U²-Net."
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Prevent theme flash -->
    <script>
      const savedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;
      if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./css/variables.css" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/layout.css" />
    <link rel="stylesheet" href="./css/components.css" />
    <link rel="stylesheet" href="./css/animations.css" />
    <link rel="stylesheet" href="./css/dark-mode.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="header">
        <div class="logo-container">
          <svg
            class="logo-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="width: 32px; height: 32px; color: var(--primary)"
          >
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
          <h1 class="logo-text">bgc remover</h1>
        </div>
        <div class="controls-header">
          <button id="themeToggle" class="btn-icon" aria-label="Toggle theme">
            <svg
              id="moonIcon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="width: 20px; height: 20px"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <svg
              id="sunIcon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="width: 20px; height: 20px; display: none"
            >
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
          </button>
        </div>
      </header>

      <!-- Main Workspace -->
      <main class="main-content">
        <div class="workspace">
          <!-- STATE 1: Upload Zone (visible by default) -->
          <div id="stateUpload">
            <div
              id="uploadZone"
              class="upload-zone"
              tabindex="0"
              role="button"
              aria-label="Upload image"
            >
              <input
                type="file"
                id="fileInput"
                class="visually-hidden"
                accept="image/png, image/jpeg, image/webp"
              />
              <svg
                class="upload-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                <polyline points="21 15 16 10 5 21"></polyline>
              </svg>
              <div>
                <p class="upload-text">Click to upload or drag & drop</p>
                <p class="upload-hint">PNG, JPG or WebP (max. 5MB)</p>
              </div>
            </div>

            <div
              style="
                margin-top: var(--space-4);
                display: flex;
                flex-direction: column;
                align-items: center;
              "
            >
              <label
                for="apiKeyInput"
                style="
                  font-size: 0.875rem;
                  color: var(--text-secondary);
                  margin-bottom: 0.5rem;
                "
                >Remove.bg API Key (Required on Vercel)</label
              >
              <input
                type="password"
                id="apiKeyInput"
                placeholder="Paste your API key here..."
                style="
                  padding: 0.5rem 1rem;
                  border-radius: var(--radius-md);
                  border: 1px solid var(--border);
                  background: var(--surface);
                  color: var(--text-primary);
                  width: 100%;
                  max-width: 320px;
                  font-family: var(--font-primary);
                "
              />
              <p
                style="
                  font-size: 0.75rem;
                  color: var(--text-tertiary);
                  margin-top: 0.5rem;
                  text-align: center;
                "
              >
                Get 50 free HD images/month at
                <a
                  href="https://www.remove.bg"
                  target="_blank"
                  style="color: var(--primary); text-decoration: none"
                  >remove.bg</a
                >.
              </p>
            </div>
          </div>

          <!-- STATE 2: Preview + Process Button (hidden by default) -->
          <div id="statePreview" style="display: none">
            <div class="preview-card">
              <img id="previewImage" class="preview-card-image" alt="Preview" />
              <div class="preview-card-footer">
                <div class="file-details">
                  <span id="fileName" class="file-name">filename.jpg</span>
                  <span id="fileSize" class="file-size">1.2 MB</span>
                </div>
                <div style="display: flex; gap: var(--space-3)">
                  <button id="cancelBtn" class="btn btn-outline">Cancel</button>
                  <button id="processBtn" class="btn btn-primary">
                    <svg
                      viewBox="0 0 24 24"
                      width="16"
                      height="16"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path
                        d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"
                      />
                    </svg>
                    Remove Background
                  </button>
                </div>
              </div>
            </div>
          </div>

          <!-- STATE 3: Processing Skeleton (hidden by default) -->
          <div id="stateProcessing" style="display: none">
            <div class="processing-card" aria-live="polite">
              <div
                class="shimmer-wrapper"
                style="
                  width: 100%;
                  height: 300px;
                  border-radius: var(--radius-lg);
                "
              ></div>
              <div
                style="
                  display: flex;
                  flex-direction: column;
                  align-items: center;
                  gap: var(--space-3);
                  padding: var(--space-4);
                "
              >
                <div
                  class="shimmer-wrapper skeleton-text"
                  style="width: 200px"
                ></div>
                <div
                  class="shimmer-wrapper skeleton-text"
                  style="width: 150px; height: 12px"
                ></div>
                <p
                  id="processingText"
                  style="
                    color: var(--text-secondary);
                    font-size: 0.875rem;
                    margin-top: var(--space-2);
                  "
                >
                  Processing via <span id="modelIndicator">AI</span>...
                </p>
              </div>
            </div>
          </div>

          <!-- STATE 4: Result View (hidden by default) -->
          <div id="stateResult" style="display: none">
            <div class="comparison-wrapper checkerboard" id="comparisonWrapper">
              <img
                id="resultImage"
                class="comparison-image image-after"
                alt="Background Removed"
              />
              <img
                id="originalImage"
                class="comparison-image image-before"
                alt="Original Image"
              />
              <div id="sliderHandleVisual" class="slider-handle-visual"></div>
              <input
                type="range"
                id="comparisonSlider"
                class="comparison-slider"
                min="0"
                max="100"
                value="50"
                aria-label="Compare original and result"
              />
            </div>

            <div class="tools-panel">
              <div class="bg-options">
                <span style="font-size: 0.875rem; font-weight: 500"
                  >Background:</span
                >
                <div class="swatches" id="colorSwatches">
                  <div
                    class="swatch active"
                    style="
                      background-image: conic-gradient(
                        #e2e8f0 25%,
                        #f8fafc 25%,
                        #f8fafc 50%,
                        #e2e8f0 50%,
                        #e2e8f0 75%,
                        #f8fafc 75%,
                        #f8fafc 100%
                      );
                      background-size: 8px 8px;
                    "
                    data-color="transparent"
                    title="Transparent"
                  ></div>
                  <div
                    class="swatch"
                    style="background: #ffffff"
                    data-color="#ffffff"
                  ></div>
                  <div
                    class="swatch"
                    style="background: #000000"
                    data-color="#000000"
                  ></div>
                  <div
                    class="swatch"
                    style="background: #ef4444"
                    data-color="#ef4444"
                  ></div>
                  <div
                    class="swatch"
                    style="background: #3b82f6"
                    data-color="#3b82f6"
                  ></div>
                  <div
                    class="swatch"
                    style="background: #10b981"
                    data-color="#10b981"
                  ></div>
                </div>
                <input
                  type="color"
                  id="customColorPicker"
                  class="color-picker"
                  value="#ff00ff"
                  title="Pick custom color"
                />
              </div>

              <div style="display: flex; gap: var(--space-3)">
                <button id="resetBtn" class="btn btn-outline">New Image</button>
                <button id="downloadBtn" class="btn btn-primary">
                  <svg
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  Download PNG
                </button>
              </div>
            </div>

            <div class="metadata-bar" id="metadataBar">
              <div class="metadata-item">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span id="metaTime">-- ms</span>
              </div>
              <div class="metadata-item">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
                  <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
                  <line x1="6" y1="6" x2="6.01" y2="6"></line>
                  <line x1="6" y1="18" x2="6.01" y2="18"></line>
                </svg>
                <span id="metaModel">--</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="footer">
        <p>Built with vanilla JS and ONNX Runtime running U²-Net.</p>
      </footer>
    </div>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
